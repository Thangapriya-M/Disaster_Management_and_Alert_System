<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DMAS — Login</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh;
      background: linear-gradient(135deg, #922b21 0%, #2c3e50 100%); }
    .auth-wrap { width:420px; max-width:95vw; }
    .auth-logo { text-align:center; margin-bottom:28px; }
    .auth-logo .logo-icon { font-size:3.5rem; }
    .auth-logo h1 { color:white; font-size:1.4rem; font-weight:800; margin-top:8px; letter-spacing:0.5px; }
    .auth-logo p  { color:rgba(255,255,255,0.7); font-size:0.88rem; margin-top:4px; }
    .auth-card { background:white; border-radius:18px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .auth-tabs { display:flex; }
    .auth-tab {
      flex:1; padding:14px; text-align:center; cursor:pointer;
      font-weight:700; font-size:0.9rem; background:#f8f9fa; color:#888;
      border-bottom:3px solid transparent; transition:all 0.2s;
    }
    .auth-tab.active { background:white; color:#c0392b; border-bottom-color:#c0392b; }
    .auth-body { padding:28px; }
    .demo-accounts { background:#fff4f3; border:1px solid #f5c6c2; border-radius:8px;
      padding:12px 14px; margin-bottom:20px; font-size:0.83rem; }
    .demo-accounts strong { color:#c0392b; display:block; margin-bottom:6px; font-size:0.85rem; }
    .demo-row { display:flex; gap:6px; margin-bottom:4px; }
    .demo-btn {
      flex:1; background:#c0392b; color:white; border:none; border-radius:6px;
      padding:5px 8px; font-size:0.78rem; cursor:pointer; font-weight:600;
      transition:background 0.2s;
    }
    .demo-btn:hover { background:#962d22; }
    .demo-btn.green  { background:#27ae60; }
    .demo-btn.green:hover  { background:#1e8449; }
    .demo-btn.blue   { background:#2980b9; }
    .demo-btn.blue:hover   { background:#1f6898; }
    #error-msg { display:none; }
    #login-btn { width:100%; padding:12px; font-size:1rem; margin-top:4px; border-radius:10px; }
    #register-btn { width:100%; padding:12px; font-size:1rem; margin-top:4px; border-radius:10px; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <div class="logo-icon">🚨</div>
    <h1>DISASTER MANAGEMENT & ALERT SYSTEM</h1>
    <p>Centralized Emergency Response Platform</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showTab('login')" id="tab-login">🔐 Login</div>
      <div class="auth-tab" onclick="showTab('register')" id="tab-register">📝 Register</div>
    </div>
    <div class="auth-body">

      <!-- LOGIN -->
      <div id="login-form">
        <div class="demo-accounts">
          <strong>🧪 Demo Accounts — Click to fill:</strong>
          <div class="demo-row">
            <button class="demo-btn" onclick="fillLogin('admin@dmas.com','admin123')">⚙️ Admin</button>
            <button class="demo-btn green" onclick="fillLogin('ravi@dmas.com','resp123')">🚑 Responder</button>
            <button class="demo-btn blue"  onclick="fillLogin('arjun@dmas.com','user123')">👤 Citizen</button>
          </div>
        </div>
        <div id="error-msg" class="alert-banner alert-danger"></div>
        <div class="form-group">
          <label>Email Address</label>
          <input id="login-email" class="form-control" type="email" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="login-password" class="form-control" type="password" placeholder="••••••••"
            onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <button id="login-btn" class="btn btn-primary" onclick="doLogin()">🔐 Sign In</button>
      </div>

      <!-- REGISTER -->
      <div id="register-form" style="display:none">
        <div id="reg-error" class="alert-banner alert-danger" style="display:none"></div>
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input id="reg-name" class="form-control" placeholder="Your full name"/>
          </div>
          <div class="form-group">
            <label>Role</label>
            <select id="reg-role" class="form-control">
              <option value="CITIZEN">Citizen</option>
              <option value="RESPONDER">Responder</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input id="reg-email" class="form-control" type="email" placeholder="you@example.com"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input id="reg-password" class="form-control" type="password" placeholder="Min 6 chars"/>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input id="reg-phone" class="form-control" placeholder="9XXXXXXXXX"/>
          </div>
        </div>
        <button id="register-btn" class="btn btn-primary" onclick="doRegister()">📝 Create Account</button>
      </div>

    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (isLoggedIn()) window.location.href = '/pages/dashboard.html';

  function showTab(tab) {
    document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('tab-login').classList.toggle('active',    tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  function fillLogin(email, pass) {
    document.getElementById('login-email').value    = email;
    document.getElementById('login-password').value = pass;
  }

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('error-msg');
    errEl.style.display = 'none';
    if (!email || !password) { errEl.textContent = 'Please enter email and password.'; errEl.style.display='flex'; return; }
    const btn = document.getElementById('login-btn');
    btn.textContent = '⏳ Signing in...'; btn.disabled = true;
    const res = await apiFetch('/auth/login', { method:'POST', body: JSON.stringify({email, password}) });
    btn.textContent = '🔐 Sign In'; btn.disabled = false;
    if (res && res.ok) {
      saveSession(res.data);
      showToast('Welcome back, ' + res.data.name + '!');
      setTimeout(() => window.location.href = '/pages/dashboard.html', 600);
    } else {
      errEl.textContent = '⚠️ ' + (res?.data?.error || 'Invalid credentials');
      errEl.style.display = 'flex';
    }
  }

  async function doRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const phone    = document.getElementById('reg-phone').value.trim();
    const role     = document.getElementById('reg-role').value;
    const errEl    = document.getElementById('reg-error');
    errEl.style.display = 'none';
    if (!name || !email || !password) { errEl.textContent = 'Please fill all required fields.'; errEl.style.display='flex'; return; }
    const btn = document.getElementById('register-btn');
    btn.textContent = '⏳ Creating...'; btn.disabled = true;
    const res = await apiFetch('/auth/register', { method:'POST', body: JSON.stringify({name, email, password, phone, role}) });
    btn.textContent = '📝 Create Account'; btn.disabled = false;
    if (res && res.ok) {
      saveSession(res.data);
      showToast('Account created! Welcome, ' + name);
      setTimeout(() => window.location.href = '/pages/dashboard.html', 600);
    } else {
      errEl.textContent = '⚠️ ' + (res?.data?.error || 'Registration failed');
      errEl.style.display = 'flex';
    }
  }
</script>
</body>
</html>

# ============================================================
# DISASTER MANAGEMENT & ALERT SYSTEM - Application Config
# ============================================================

spring.application.name=disaster-management-system
server.port=8080

# H2 In-Memory Database (zero setup required)
spring.datasource.url=jdbc:h2:mem:dmasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwt.secret=dmas-super-secret-key-disaster-management-alert-system-2025-secure
app.jwt.expiration=86400000

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.view.suffix=.html
